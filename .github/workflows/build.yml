name: Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install vcpkg
      run: |
        git clone --depth=1 https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: |
          vcpkg/packages
          vcpkg/installed
          vcpkg/downloads
          vcpkg/buildtrees
        key: vcpkg-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-

    - name: Install dependencies via vcpkg
      run: |
        cd vcpkg
        # 只编译 Release 版本，跳过 Debug（节省一半时间）
        .\vcpkg install opencv4:x64-windows glew:x64-windows --recurse
        .\vcpkg integrate install
      env:
        VCPKG_BUILD_TYPE: release

    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: |
        cd build
        cmake --build . --config Release --parallel 4

    - name: Prepare artifacts
      run: |
        mkdir artifacts
        copy build\Release\*.exe artifacts\
        copy build\Release\*.dll artifacts\
        echo "⚠️ Models not included. Download from: https://huggingface.co/AmmmarkoV/SAM3DBody-cpp-onnx-models" > artifacts\DOWNLOAD_MODELS.txt

    - uses: actions/upload-artifact@v4
      with:
        name: SAM3DBody-Windows-x64
        path: artifacts/*

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libopencv-dev \
          libglew-dev \
          libgl1-mesa-dev \
          libx11-dev \
          libxi-dev \
          libxrandr-dev

    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        cp build/fast_sam_3dbody_run artifacts/
        cp build/fast_sam_3dbody_render artifacts/
        cp build/offline_sam_3dbody_render artifacts/
        cp build/*.so artifacts/ 2>/dev/null || true
        echo "⚠️ Models not included. Download from: https://huggingface.co/AmmmarkoV/SAM3DBody-cpp-onnx-models" > artifacts/DOWNLOAD_MODELS.txt

    - uses: actions/upload-artifact@v4
      with:
        name: SAM3DBody-Linux-x64
        path: artifacts/*
