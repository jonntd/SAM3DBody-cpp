name: Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install OpenCV (prebuilt)
      run: |
        # 下载预编译的 OpenCV 4.10.0（官方构建）
        $opencvUrl = "https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-windows.exe"
        Invoke-WebRequest -Uri $opencvUrl -OutFile "opencv.exe"
        7z x opencv.exe -o"C:\opencv" -y
        # 设置环境变量供 CMake 使用
        echo "OpenCV_DIR=C:\opencv\build" >> $env:GITHUB_ENV

    - name: Install GLEW (prebuilt)
      run: |
        # 下载预编译的 GLEW 2.2.0
        $glewUrl = "https://github.com/nigels-com/glew/releases/download/glew-2.2.0/glew-2.2.0-win32.zip"
        Invoke-WebRequest -Uri $glewUrl -OutFile "glew.zip"
        7z x glew.zip -o"C:\glew" -y
        # 设置环境变量
        echo "GLEW_ROOT=C:\glew\glew-2.2.0" >> $env:GITHUB_ENV

    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. `
          -DCMAKE_BUILD_TYPE=Release `
          -DOpenCV_DIR="${{ env.OpenCV_DIR }}" `
          -DGLEW_ROOT="${{ env.GLEW_ROOT }}"

    - name: Build
      run: |
        cd build
        cmake --build . --config Release --parallel 4

    - name: Prepare artifacts
      run: |
        mkdir artifacts
        copy build\Release\*.exe artifacts\
        copy build\Release\*.dll artifacts\
        echo "⚠️ Models not included. Download from: https://huggingface.co/AmmmarkoV/SAM3DBody-cpp-onnx-models" > artifacts\DOWNLOAD_MODELS.txt

    - uses: actions/upload-artifact@v4
      with:
        name: SAM3DBody-Windows-x64
        path: artifacts/*

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libopencv-dev \
          libglew-dev \
          libgl1-mesa-dev \
          libx11-dev \
          libxi-dev \
          libxrandr-dev

    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        cp build/fast_sam_3dbody_run artifacts/
        cp build/fast_sam_3dbody_render artifacts/
        cp build/offline_sam_3dbody_render artifacts/
        cp build/*.so artifacts/ 2>/dev/null || true
        echo "⚠️ Models not included. Download from: https://huggingface.co/AmmmarkoV/SAM3DBody-cpp-onnx-models" > artifacts/DOWNLOAD_MODELS.txt

    - uses: actions/upload-artifact@v4
      with:
        name: SAM3DBody-Linux-x64
        path: artifacts/*
