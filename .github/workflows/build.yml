name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        cmake --build . --config Release --parallel 4

    - name: Prepare artifacts
      run: |
        mkdir artifacts
        copy build\Release\*.exe artifacts\
        copy build\Release\*.dll artifacts\
        echo "Models not included. Download from: https://huggingface.co/AmmarkoV/SAM3DBody-cpp-onnx-models" > artifacts\DOWNLOAD_MODELS.txt

    - uses: actions/upload-artifact@v4
      with:
        name: SAM3DBody-Windows-x64
        path: artifacts/*

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libopencv-dev \
          libglew-dev \
          libgl1-mesa-dev \
          libx11-dev \
          libxi-dev \
          libxrandr-dev

    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        cp build/fast_sam_3dbody_run artifacts/
        cp build/fast_sam_3dbody_render artifacts/
        cp build/offline_sam_3dbody_render artifacts/
        cp build/*.so artifacts/ 2>/dev/null || true
        echo "Models not included. Download from: https://huggingface.co/AmmarkoV/SAM3DBody-cpp-onnx-models" > artifacts/DOWNLOAD_MODELS.txt

    - uses: actions/upload-artifact@v4
      with:
        name: SAM3DBody-Linux-x64
        path: artifacts/*

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: SAM3DBody-Windows-x64
        path: windows

    - name: Download Linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: SAM3DBody-Linux-x64
        path: linux

    - name: Package artifacts
      run: |
        mkdir -p release
        cd windows
        zip -r ../release/SAM3DBody-Windows-x64.zip .
        cd ../linux
        tar -czf ../release/SAM3DBody-Linux-x64.tar.gz .
        cd ..

    - name: Get version
      id: version
      run: |
        VERSION=$(date +'%Y.%m.%d')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: v${{ steps.version.outputs.version }}
        body: |
          ## SAM3DBody-cpp Release
          
          Standalone C++ inference engine for SAM-3D-Body — zero Python dependency at runtime.

          ### 📦 Supported Platforms
          - **Windows x64**: `SAM3DBody-Windows-x64.zip` - Executables + all dependency DLLs
          - **Linux x64**: `SAM3DBody-Linux-x64.tar.gz` - Executables + shared libraries

          ---

          ## 🚀 Quick Start

          ### Step 1: Download Models
          
          **⚠️ Models are NOT included in this release.**
          
          **Official model repository:**
          ```
          https://huggingface.co/AmmarkoV/SAM3DBody-cpp-onnx-models
          ```
          
          > **Note**: If the above link is inaccessible, the repository may be private or require access permission. 
          > Please check the original repository for updates: https://github.com/AmmarkoV/SAM3DBody-cpp
          
          **Option A: Full package (CUDA GPU required)**
          ```bash
          # Download from HuggingFace (if accessible)
          wget https://huggingface.co/AmmarkoV/SAM3DBody-cpp-onnx-models/resolve/main/SAM3DBody-cpp-onnx-models.zip
          unzip SAM3DBody-cpp-onnx-models.zip
          # Creates onnx/ directory with all models (~5GB)
          ```
          
          **Option B: CPU-only (no GPU)**
          ```bash
          # Download FP32 backbone for CPU inference
          wget https://huggingface.co/AmmarkoV/SAM3DBody-cpp-onnx-models/resolve/main/backbone_fp32.onnx
          wget https://huggingface.co/AmmarkoV/SAM3DBody-cpp-onnx-models/resolve/main/backbone_fp32.onnx.data
          mv backbone_fp32.onnx* onnx/
          ```
          
          **If models are unavailable**, you may need to:
          1. Contact the repository owner for access
          2. Export models from the Python training environment (see [Fast-SAM-3D-Body](https://github.com/AmmarkoV/Fast-SAM-3D-Body))

          ### Step 2: Extract Release

          **Windows:**
          ```powershell
          # Extract SAM3DBody-Windows-x64.zip to C:\SAM3DBody
          Expand-Archive SAM3DBody-Windows-x64.zip -DestinationPath C:\SAM3DBody
          ```

          **Linux:**
          ```bash
          tar -xzf SAM3DBody-Linux-x64.tar.gz
          ```

          ### Step 3: Run

          **Windows (PowerShell):**
          ```powershell
          cd C:\SAM3DBody
          
          # Single image
          .\fast_sam_3dbody_run.exe --onnx-dir onnx --gguf onnx\pipeline.gguf --yolo onnx\yolo.onnx --from image.jpg
          
          # Video file
          .\fast_sam_3dbody_run.exe --onnx-dir onnx --gguf onnx\pipeline.gguf --yolo onnx\yolo.onnx --from video.mp4
          
          # Webcam
          .\fast_sam_3dbody_run.exe --onnx-dir onnx --gguf onnx\pipeline.gguf --yolo onnx\yolo.onnx --from 0
          
          # CPU mode (use backbone_fp32.onnx)
          .\fast_sam_3dbody_run.exe --onnx-dir onnx --gguf onnx\pipeline.gguf --yolo onnx\yolo.onnx --backbone backbone_fp32.onnx --cuda -1 --from video.mp4
          ```

          **Linux:**
          ```bash
          # Single image
          ./fast_sam_3dbody_run --onnx-dir onnx --gguf onnx/pipeline.gguf --yolo onnx/yolo.onnx --from image.jpg
          
          # Video + BVH export
          ./fast_sam_3dbody_run --onnx-dir onnx --gguf onnx/pipeline.gguf --yolo onnx/yolo.onnx --from video.mp4 --bvh output.bvh --headless
          
          # Webcam
          ./fast_sam_3dbody_run --onnx-dir onnx --gguf onnx/pipeline.gguf --yolo onnx/yolo.onnx --from 0
          ```

          ---

          ## 📋 Common Parameters

          | Parameter | Description | Default |
          |-----------|-------------|---------|
          | `--onnx-dir PATH` | Model directory | Required |
          | `--gguf PATH` | pipeline.gguf path | Required |
          | `--yolo PATH` | YOLO model path | Required |
          | `--from SRC` | Input: image/video path or camera index | Required |
          | `--cuda DEVICE` | CUDA device (-1 = CPU) | 0 |
          | `--bvh PATH` | Export BVH motion capture file | None |
          | `--headless` | No display window | False |
          | `--skip-body` | Skip body model (faster) | False |
          | `--out PATH` | Output CSV file path | None |

          ---

          ## 🎬 BVH Motion Capture Export

          Export standard BVH files for Blender:
          ```bash
          ./fast_sam_3dbody_run --from video.mp4 --bvh output.bvh --headless
          # Creates: output_0.bvh, output_1.bvh, ... (one per person)
          ```

          ---

          ## ⚠️ Important Notes

          1. **GPU Required for Default Models**: The default `backbone.onnx` uses BF16 format and requires CUDA GPU
          2. **CPU Mode**: Use `backbone_fp32.onnx` + `--cuda -1` for CPU-only inference
          3. **Performance**:
             - GPU mode: Real-time or near real-time
             - CPU mode: 5-15 seconds per frame (not recommended for videos)

          ---

          ## 📚 More Information

          - **Full Documentation**: https://github.com/jonntd/SAM3DBody-cpp#readme
          - **Model Download**: https://huggingface.co/AmmarkoV/SAM3DBody-cpp-onnx-models
          - **Issues**: https://github.com/jonntd/SAM3DBody-cpp/issues
        files: |
          release/SAM3DBody-Windows-x64.zip
          release/SAM3DBody-Linux-x64.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
