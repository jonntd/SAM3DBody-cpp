name: Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install OpenCV (prebuilt)
      run: |
        # 下载预编译的 OpenCV 4.8.0（比 vcpkg 编译快很多）
        Invoke-WebRequest -Uri "https://github.com/opencv/opencv/releases/download/4.8.0/opencv-4.8.0-windows.exe" -OutFile "opencv.exe"
        7z x opencv.exe -o"C:\opencv" -y
        echo "OpenCV_DIR=C:\opencv\build" >> $env:GITHUB_ENV

    - name: Install GLEW via vcpkg (fast)
      run: |
        # GLEW 很小，用 vcpkg 编译也很快
        git clone --depth=1 https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat
        .\vcpkg install glew:x64-windows --recurse
        .\vcpkg integrate install
        echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV

    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DOpenCV_DIR="${{ env.OpenCV_DIR }}" -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: |
        cd build
        cmake --build . --config Release --parallel 4

    - name: Prepare artifacts
      run: |
        mkdir artifacts
        copy build\Release\*.exe artifacts\
        copy build\Release\*.dll artifacts\
        echo "⚠️ Models not included. Download from: https://huggingface.co/AmmmarkoV/SAM3DBody-cpp-onnx-models" > artifacts\DOWNLOAD_MODELS.txt

    - uses: actions/upload-artifact@v4
      with:
        name: SAM3DBody-Windows-x64
        path: artifacts/*

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libopencv-dev \
          libglew-dev \
          libgl1-mesa-dev \
          libx11-dev \
          libxi-dev \
          libxrandr-dev

    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        cp build/fast_sam_3dbody_run artifacts/
        cp build/fast_sam_3dbody_render artifacts/
        cp build/offline_sam_3dbody_render artifacts/
        cp build/*.so artifacts/ 2>/dev/null || true
        echo "⚠️ Models not included. Download from: https://huggingface.co/AmmmarkoV/SAM3DBody-cpp-onnx-models" > artifacts/DOWNLOAD_MODELS.txt

    - uses: actions/upload-artifact@v4
      with:
        name: SAM3DBody-Linux-x64
        path: artifacts/*
